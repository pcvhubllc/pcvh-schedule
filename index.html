<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule an Appointment || PCV Hub</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Online Self-Scheduling || PCV Hub" />
    <meta property="og:description" content="Self-service appointment book for assessments, consults, and more. Private and secure." />
    <meta property="og:url" content="https://schedule.pcvhub.com" />

    <meta property="og:image" content="https://schedule.pcvhub.com/assets/water-logo-ENHANCED.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Schedule an Appointment | PCV Hub" />
    <meta name="twitter:description" content="Secure link to self-scheduling portal." />
    <meta name="twitter:image" content="https://schedule.pcvhub.com/assets/pcvh-water.jpg" />

    <!-- Third-Party Assets -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    iframe {
      filter: invert(1) hue-rotate(180deg);
      mix-blend-mode: screen;
    }
    </style>
</head>

<body class="bg-[#090e1bfb] text-[#ac9c4c] flex flex-col min-h-screen">

    <!-- Logo/Branding -->
    <header class="bg-slate-950/75 border-b border-teal-400 py-4 px-[5%] flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <img src="https://schedule.pcvhub.com/assets/logo_white_NO-BG.png" alt="PCV Hub Logo" class="h-8 w-8 rounded-lg" />
            <span class="font-bold text-xl text-teal-500/85 tracking-tight">PCV <span class="text-[#ac9c4c]">Hub</span></span>
        </div>
        <nav>
            <a href="https://pcvhub.com" class="text-sm font-medium text-slate-500 hover:text-teal-400/80 transition">Go to PCVH Homepage</a>
        </nav>
    </header>

    <!-- Calendar iframe -->
    <main class="flex-grow px-[5%] py-6">
        <div class="w-full h-[75vh] bg-[#020617] rounded-xl shadow-md border border-teal-200/85 overflow-hidden grid grid-cols-1 grid-rows-1">

            <div class="col-start-1 row-start-1 bg-[#020617] flex flex-col items-center justify-center z-10">
                <div id="calendar-spinner" class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600 mb-2"></div>
                <p id="calendar-loading" class="text-xs text-slate-400 font-medium animate-pulse">Loading calendar integration...</p>
            </div>

            <iframe
                src="https://calendar.google.com/calendar/appointments/AcZssZ1TFkLMx2NgLe1R-8Jk-vpEywYgvXvfpknw1cM="
                class="w-full h-full border-none col-start-1 row-start-1 z-20 bg-white"
                onload="document.getElementById('calendar-spinner').remove(); document.getElementById('calendar-loading').remove();">
            </iframe>

        </div>
    </main>

    <footer class="bg-slate-950/75 border-t border-teal-400 py-4 px-[5%] flex flex-col sm:flex-row justify-between items-center text-xs text-slate-500">
        <div>
            &copy; 2026 PCV Hub LLC. All rights reserved.
        </div>
        <div class="mt-2 sm:mt-0 space-x-4">
            <a href="https://strongholdgpn.com/legal" class="hover:text-[#ac9c4c]">Privacy Policy</a>
            <a href="https://strongholdgpn.com/legal" class="hover:text-[#ac9c4c]">Terms of Service</a>
        </div>
    </footer>
    </body>
</html>
